<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video2Action</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bento-container">
    <header class="bento-header">
      <div class="header-left">
        <span class="logo">🍱</span>
        <h1 id="headerTitle">行动便当</h1>
        <span class="subtitle" id="headerSubtitle">Action Bento</span>
      </div>
      <div class="header-right">
        <div class="lang-switcher" id="langSwitcher">
          <button class="lang-btn active" data-lang="zh-CN">简</button>
          <button class="lang-btn" data-lang="zh-TW">繁</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="icon-btn" id="settingsBtn" title="AI Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
        <span class="action-count" id="actionCount"></span>
      </div>
    </header>

    <!-- View Tabs: Active / History -->
    <div class="view-tabs" id="viewTabs">
      <button class="view-tab active" data-view="active" id="tabActive">待消化</button>
      <button class="view-tab" data-view="history" id="tabHistory">消化的营养</button>
    </div>

    <!-- Active View -->
    <div id="activeView">
      <div class="link-bar" id="linkBar">
        <div class="link-input-wrap">
          <span class="link-icon">🔗</span>
          <input type="text" class="link-input" id="linkInput" placeholder="粘贴视频链接...">
          <button class="link-analyze-btn" id="analyzeBtn">
            <span id="analyzeLabel">拆解</span>
            <div class="analyze-spinner hidden" id="analyzeSpinner"></div>
          </button>
        </div>
        <div class="link-status hidden" id="linkStatus"></div>
      </div>
      <div class="progress-section" id="progressSection">
        <div class="progress-header">
          <span class="progress-label" id="progressLabel">学习进度</span>
          <span class="progress-count" id="progressCount">0 / 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="milestone-list" id="milestoneList"></div>
    </div>

    <!-- History View -->
    <div id="historyView" class="hidden">
      <div class="history-stats" id="historyStats"></div>
      <div class="milestone-list" id="historyList"></div>
    </div>

    <footer class="bento-footer">
      <span id="footerText"></span>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay hidden" id="settingsOverlay">
    <div class="modal-panel">
      <div class="modal-header">
        <h2 id="settingsTitle">AI Settings</h2>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" id="labelProvider">Provider</label>
          <div class="provider-switcher" id="providerSwitcher">
            <button class="provider-btn active" data-provider="openai">OpenAI</button>
            <button class="provider-btn" data-provider="custom">Custom</button>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label" id="labelApiKey">API Key</label>
          <div class="key-input-wrap">
            <input type="password" class="field-input" id="apiKeyInput" placeholder="sk-...">
            <button class="key-toggle" id="keyToggle">👁</button>
          </div>
        </div>
        <div class="field-group hidden" id="customEndpointGroup">
          <label class="field-label" id="labelEndpoint">Endpoint</label>
          <input type="text" class="field-input" id="endpointInput" placeholder="https://api.example.com/v1">
        </div>
        <div class="field-group">
          <label class="field-label" id="labelModel">Model</label>
          <input type="text" class="field-input" id="modelInput" placeholder="gpt-4o-mini">
        </div>
        <div class="field-actions">
          <div class="connection-status" id="connectionStatus"></div>
          <button class="save-settings-btn" id="saveSettingsBtn"><span id="saveLabel">Save</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas"></canvas>

  <div class="action-toast" id="actionToast">+1</div>

  <script src="i18n.js?v=3"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
